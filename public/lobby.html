<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Kingdoms Lobby</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby-screen">
    <div class="lobby-container glass-panel">
      <span class="lobby-icon">⚔️</span>
      <h1 class="lobby-title">Three Kingdoms</h1>
      <p class="lobby-subtitle">ศึกสามก๊ก - ล็อบบี้หลัก</p>

      <div id="panel-menu" class="menu-panel">
        <div class="form-group">
          <label for="input-nickname">ชื่อผู้เล่น (Nickname)</label>
          <input type="text" id="input-nickname" placeholder="ระบุชื่อผู้เล่น..." value="ผู้กล้าไร้นาม">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label for="select-bot-count">จำนวนผู้เล่นในเกม (รวมบอท)</label>
          <select id="select-bot-count" style="background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); border-radius: var(--radius-md); padding: 12px; width: 100%;">
            <option value="3">3 คน (โหมดย่อ)</option>
            <option value="4">4 คน</option>
            <option value="5">5 คน</option>
            <option value="6">6 คน</option>
            <option value="7">7 คน</option>
            <option value="8">8 คน</option>
            <option value="9">9 คน</option>
            <option value="10">10 คน (กฎเต็มรูปแบบ)</option>
          </select>
        </div>
        <div class="menu-actions">
          <button class="btn-menu btn-accent" id="btn-mode-bot">🤖 เล่นกับบอท (Single Player)</button>
          <button class="btn-menu btn-primary" id="btn-mode-online-menu">🌐 เล่นออนไลน์ (Multiplayer)</button>
        </div>
      </div>

      <div id="panel-online-setup" class="menu-panel hidden">
        <div class="form-group">
          <label for="input-online-room-id">รหัสห้อง (Room ID)</label>
          <input type="text" id="input-online-room-id" placeholder="ระบุรหัสห้อง...">
        </div>
        <div class="menu-actions-grid">
          <button class="btn-action btn-play" id="btn-create-online">สร้างห้องใหม่</button>
          <button class="btn-action btn-primary" id="btn-join-online">เข้าร่วมห้อง</button>
        </div>
        <button class="btn-back" id="btn-back-to-menu">⬅️ ย้อนกลับ</button>
      </div>
    </div>
  </div>
  <script src="/lobby.js?v=4"></script>
</body>
</html>
